<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <title>Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- FOOD LOG -->
      <div id="log-wrapper">
        <div id="food-log">
          <!-- Header Row -->
          <div class="log-row log-header">
            <div class="col-check"></div>
            <div class="col-food">Food</div>
            <div class="col-servings">Servings</div>
            <div class="col-cal">Calories</div>
            <div class="col-pro">Protein</div>
            <div class="col-carb">Carbs</div>
            <div class="col-fat">Fat</div>
            <div class="col-del"></div>
          </div>

          <!-- Log Body -->
          <div id="log-body"></div>

          <!-- Add Row -->
          <div class="log-row" id="add-row">
            <div class="col-check">
              <button id="custom-toggle" onclick="toggleCustomMode()">
                <svg
                  class="custom-svg"
                  fill="currentColor"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 640 640"
                >
                  <!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
                  <path
                    d="M295.4 37L310.2 73.8L347 88.6C350 89.8 352 92.8 352 96C352 99.2 350 102.2 347 103.4L310.2 118.2L295.4 155C294.2 158 291.2 160 288 160C284.8 160 281.8 158 280.6 155L265.8 118.2L229 103.4C226 102.2 224 99.2 224 96C224 92.8 226 89.8 229 88.6L265.8 73.8L280.6 37C281.8 34 284.8 32 288 32C291.2 32 294.2 34 295.4 37zM142.7 105.7L164.2 155.8L214.3 177.3C220.2 179.8 224 185.6 224 192C224 198.4 220.2 204.2 214.3 206.7L164.2 228.2L142.7 278.3C140.2 284.2 134.4 288 128 288C121.6 288 115.8 284.2 113.3 278.3L91.8 228.2L41.7 206.7C35.8 204.2 32 198.4 32 192C32 185.6 35.8 179.8 41.7 177.3L91.8 155.8L113.3 105.7C115.8 99.8 121.6 96 128 96C134.4 96 140.2 99.8 142.7 105.7zM496 368C502.4 368 508.2 371.8 510.7 377.7L532.2 427.8L582.3 449.3C588.2 451.8 592 457.6 592 464C592 470.4 588.2 476.2 582.3 478.7L532.2 500.2L510.7 550.3C508.2 556.2 502.4 560 496 560C489.6 560 483.8 556.2 481.3 550.3L459.8 500.2L409.7 478.7C403.8 476.2 400 470.4 400 464C400 457.6 403.8 451.8 409.7 449.3L459.8 427.8L481.3 377.7C483.8 371.8 489.6 368 496 368zM492 64C503 64 513.6 68.4 521.5 76.2L563.8 118.5C571.6 126.4 576 137 576 148C576 159 571.6 169.6 563.8 177.5L475.6 265.7L374.3 164.4L462.5 76.2C470.4 68.4 481 64 492 64zM76.2 462.5L340.4 198.3L441.7 299.6L177.5 563.8C169.6 571.6 159 576 148 576C137 576 126.4 571.6 118.5 563.8L76.2 521.5C68.4 513.6 64 503 64 492C64 481 68.4 470.4 76.2 462.5z"
                  />
                </svg>
              </button>
            </div>
            <div class="col-food" style="position: relative">
              <input type="text" id="food-search" autocomplete="off" />
              <ul id="autocomplete-list"></ul>
            </div>
            <div class="col-servings">
              <input type="number" id="servings" placeholder="Qty" min="0" />
              <span id="serving-size-label"></span>
            </div>
            <div class="col-cal" id="cal-preview">-</div>
            <div class="col-pro" id="pro-preview">-</div>
            <div class="col-carb" id="carb-preview">-</div>
            <div class="col-fat" id="fat-preview">-</div>
            <div class="col-del">
              <button id="add-btn">
                <svg
                  class="add-svg"
                  fill="currentColor"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 640 640"
                >
                  <path
                    d="M320 576C461.4 576 576 461.4 576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320C64 461.4 178.6 576 320 576zM296 408L296 344L232 344C218.7 344 208 333.3 208 320C208 306.7 218.7 296 232 296L296 296L296 232C296 218.7 306.7 208 320 208C333.3 208 344 218.7 344 232L344 296L408 296C421.3 296 432 306.7 432 320C432 333.3 421.3 344 408 344L344 344L344 408C344 421.3 333.3 432 320 432C306.7 432 296 421.3 296 408z"
                  />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- SUMMARY ROW -->
      <div id="summary-section">
        <div id="summary-log">
          <div class="log-row" id="summary-row">
            <div class="col-check"></div>
            <div class="col-food sum-label">Total</div>
            <div class="col-servings"></div>
            <div class="col-cal sum-cell">
              <span class="sum-vals" id="sum-cal">0 / 2200</span>
              <div class="sum-bar">
                <div class="sum-fill" id="bar-cal"></div>
              </div>
            </div>
            <div class="col-pro sum-cell">
              <span class="sum-vals" id="sum-pro">0 / 185</span>
              <div class="sum-bar">
                <div class="sum-fill" id="bar-pro"></div>
              </div>
            </div>
            <div class="col-carb sum-cell">
              <span class="sum-vals" id="sum-carb">0 / 240</span>
              <div class="sum-bar">
                <div class="sum-fill" id="bar-carb"></div>
              </div>
            </div>
            <div class="col-fat sum-cell">
              <span class="sum-vals" id="sum-fat">0 / 55</span>
              <div class="sum-bar">
                <div class="sum-fill" id="bar-fat"></div>
              </div>
            </div>
            <div class="col-del"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/papaparse.min.js"></script>
    <script src="js/functions.js"></script>
  </body>
</html>
